version: "3.9"

services:
  axon-server:
    build:
      context: .
      dockerfile: Dockerfile.inference-engine
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./ml_model/xgb_housing:/models/xgb_housing:ro
      - ./nlp_model/tokenizer:/models/tokenizer:ro
      - ./nlp_model/ner_model:/models/ner_model:ro
      - ./nlp_model/decoder:/models/decoder:ro
      - ./nlp_model/pipeline:/models/pipeline:ro
      - axon-logs:/tmp/logs/axon
    command:
      - "--model-repository=/models"
      - "--model-control-mode=poll"
      - "--http-port=8000"
      - "--grpc-port=8001"
      - "--metrics-port=8002"
      - "--log-level=info"
      - "--log-dir=/tmp/logs/axon"
      - "--log-rotation=7d"
      - "--inference-timeout-ms=30000"
    restart: unless-stopped

volumes:
  axon-logs:
