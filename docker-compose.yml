version: "3.9"

services:
  axon-server:
    build:
      context: .
      dockerfile: Dockerfile.inference-engine
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ${MODEL_REPO_PATH:-./local_models/model_repository}:/models:ro
    command:
      - "--model-repository=/models"
      - "--model-control-mode=poll"
      - "--repository-poll-secs=30"
      - "--http-port=8000"
      - "--grpc-port=8001"
      - "--metrics-port=8002"
    restart: unless-stopped
