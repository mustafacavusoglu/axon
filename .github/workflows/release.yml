name: Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE_NAME: mustdo12/axon-server

jobs:
  release:
    runs-on: ubuntu-latest
    environment: docker-env
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            inference-engine/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('inference-engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libssl-dev

      - name: Build release binary
        run: cargo build --release
        working-directory: inference-engine

      - name: Set tag version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename binary
        run: mv target/release/axon-server axon-server-linux-x86_64
        working-directory: inference-engine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: inference-engine/axon-server-linux-x86_64
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.inference-engine
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
