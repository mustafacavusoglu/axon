name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: mustdo12/axon-server

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'inference-engine/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            inference-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('inference-engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libssl-dev

      - name: cargo fmt --check
        run: cargo fmt --check
        working-directory: inference-engine

      - name: cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: inference-engine

      - name: cargo test
        run: cargo test
        working-directory: inference-engine

  docker:
    needs: [changes, test]
    if: |
      needs.test.result == 'success'
      && needs.changes.outputs.src == 'true'
      && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: docker-env
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version
        id: ver
        run: |
          VERSION=$(grep '^version' inference-engine/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set arch suffix
        id: arch
        run: |
          if [[ "${{ matrix.platform }}" == "linux/amd64" ]]; then
            echo "suffix=amd64" >> $GITHUB_OUTPUT
          else
            echo "suffix=arm64" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.inference-engine
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}-${{ steps.arch.outputs.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    environment: docker-env
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version
        id: ver
        run: |
          VERSION=$(grep '^version' inference-engine/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          IMAGE="${{ env.IMAGE_NAME }}"
          docker buildx imagetools create -t ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64
          docker buildx imagetools create -t ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

  release:
    needs: [changes, test]
    if: |
      needs.test.result == 'success'
      && needs.changes.outputs.src == 'true'
      && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: docker-env
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Install cross-compilation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler libssl-dev \
            gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            inference-engine/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('inference-engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Extract version
        id: ver
        run: |
          VERSION=$(grep '^version' inference-engine/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build amd64 binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        working-directory: inference-engine

      - name: Build arm64 binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu
        working-directory: inference-engine

      - name: Rename binaries
        run: |
          mv target/x86_64-unknown-linux-gnu/release/axon-server axon-server-linux-amd64
          mv target/aarch64-unknown-linux-gnu/release/axon-server axon-server-linux-arm64
        working-directory: inference-engine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: |
            inference-engine/axon-server-linux-amd64
            inference-engine/axon-server-linux-arm64
          generate_release_notes: true
