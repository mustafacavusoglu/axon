name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: mustdo12/axon-server

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'inference-engine/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            inference-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('inference-engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libssl-dev

      - name: cargo fmt --check
        run: cargo fmt --check
        working-directory: inference-engine

      - name: cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: inference-engine

      - name: cargo test
        run: cargo test
        working-directory: inference-engine

  docker:
    needs: [changes, test]
    if: |
      needs.test.result == 'success'
      && needs.changes.outputs.src == 'true'
      && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: docker-env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version
        id: ver
        run: |
          VERSION=$(grep '^version' inference-engine/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.inference-engine
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [changes, test]
    if: |
      needs.test.result == 'success'
      && needs.changes.outputs.src == 'true'
      && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: docker-env
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            inference-engine/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('inference-engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libssl-dev

      - name: Extract version
        id: ver
        run: |
          VERSION=$(grep '^version' inference-engine/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release binary
        run: cargo build --release
        working-directory: inference-engine

      - name: Rename binary
        run: mv target/release/axon-server axon-server-linux-x86_64
        working-directory: inference-engine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: inference-engine/axon-server-linux-x86_64
          generate_release_notes: true
