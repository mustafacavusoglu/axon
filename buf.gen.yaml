version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/mustafacavusoglu/axon/control-plane
plugins:
  - remote: buf.build/protocolbuffers/go
    out: control-plane
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: control-plane
    opt:
      - paths=source_relative
