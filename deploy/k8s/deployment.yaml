apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-server
  labels:
    app: inference-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-server
  template:
    metadata:
      labels:
        app: inference-server
    spec:
      containers:
        - name: control-plane
          image: axon/control-plane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8001
              name: grpc
          env:
            - name: INFERENCE_SOCKET
              value: /run/inference.sock
            - name: MODEL_REPO_PATH
              value: /models
            - name: HTTP_PORT
              value: "8080"
            - name: GRPC_PORT
              value: "8001"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: models
              mountPath: /models
            - name: socket-dir
              mountPath: /run

        - name: inference-engine
          image: axon/inference-engine:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SOCKET_PATH
              value: /run/inference.sock
            - name: NUM_THREADS
              value: "2"
            - name: ARENA_SIZE_MB
              value: "2048"
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: socket-dir
              mountPath: /run

      volumes:
        - name: models
          hostPath:
            path: /Users/mustafacavusoglu/workspace/axon/local_models/model_repository
            type: Directory
        - name: socket-dir
          emptyDir: {}
