apiVersion: v1
kind: Service
metadata:
  name: inference-server
spec:
  selector:
    app: inference-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: inference-server-headless
spec:
  clusterIP: None
  selector:
    app: inference-server
  ports:
    - name: grpc
      port: 8001
      targetPort: 8001
