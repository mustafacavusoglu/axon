name: ner_model
platform: onnxruntime_onnx
max_batch_size: 1

inputs:
  - name: input_ids
    data_type: TYPE_INT64
    dims: [1, -1]
  - name: attention_mask
    data_type: TYPE_INT64
    dims: [1, -1]
  - name: token_type_ids
    data_type: TYPE_INT64
    dims: [1, -1]

outputs:
  - name: logits
    data_type: TYPE_FP32
    dims: [1, -1, 7]

instance_groups:
  - count: 1
    kind: KIND_CPU
