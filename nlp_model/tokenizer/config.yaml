name: tokenizer
platform: script
max_batch_size: 1

inputs:
  - name: text
    data_type: TYPE_STRING
    dims: [1]

outputs:
  - name: input_ids
    data_type: TYPE_INT64
    dims: [1, -1]
  - name: attention_mask
    data_type: TYPE_INT64
    dims: [1, -1]
  - name: token_type_ids
    data_type: TYPE_INT64
    dims: [1, -1]
  - name: words
    data_type: TYPE_STRING
    dims: [1]

instance_groups:
  - count: 2
    kind: KIND_CPU
