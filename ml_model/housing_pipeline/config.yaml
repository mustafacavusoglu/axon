name: housing_pipeline
platform: ensemble
max_batch_size: 1

inputs:
  - name: median_income
    data_type: TYPE_FP32
    dims: [1]
  - name: house_age
    data_type: TYPE_FP32
    dims: [1]
  - name: avg_rooms
    data_type: TYPE_FP32
    dims: [1]
  - name: avg_bedrooms
    data_type: TYPE_FP32
    dims: [1]
  - name: population
    data_type: TYPE_FP32
    dims: [1]
  - name: avg_occupancy
    data_type: TYPE_FP32
    dims: [1]
  - name: latitude
    data_type: TYPE_FP32
    dims: [1]
  - name: longitude
    data_type: TYPE_FP32
    dims: [1]

outputs:
  - name: variable
    data_type: TYPE_FP32
    dims: [1, 1]

ensemble_scheduling:
  steps:
    - model_name: preprocess_housing
      model_version: -1
      input_map:
        - key: median_income
          value: median_income
        - key: house_age
          value: house_age
        - key: avg_rooms
          value: avg_rooms
        - key: avg_bedrooms
          value: avg_bedrooms
        - key: population
          value: population
        - key: avg_occupancy
          value: avg_occupancy
        - key: latitude
          value: latitude
        - key: longitude
          value: longitude
      output_map:
        - key: median_income
          value: p_income
        - key: house_age
          value: p_age
        - key: avg_rooms
          value: p_rooms
        - key: avg_bedrooms
          value: p_bedrooms
        - key: population
          value: p_population
        - key: avg_occupancy
          value: p_occupancy
        - key: latitude
          value: p_latitude
        - key: longitude
          value: p_longitude

    - model_name: xgb_housing
      model_version: -1
      input_map:
        - key: median_income
          value: p_income
        - key: house_age
          value: p_age
        - key: avg_rooms
          value: p_rooms
        - key: avg_bedrooms
          value: p_bedrooms
        - key: population
          value: p_population
        - key: avg_occupancy
          value: p_occupancy
        - key: latitude
          value: p_latitude
        - key: longitude
          value: p_longitude
      output_map:
        - key: variable
          value: variable

instance_groups:
  - count: 1
    kind: KIND_CPU
